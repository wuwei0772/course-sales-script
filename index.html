<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>剑桥小班课推课话术</title>
<style>
/* ── 内联工具样式（替代 Tailwind CDN，无外部依赖，国内可正常加载） ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;border:0 solid #e2e8f0;}
html{-webkit-text-size-adjust:100%;}
body{-webkit-tap-highlight-color:transparent;line-height:1.5;}
button{font:inherit;color:inherit;background:none;cursor:pointer;}
input{font:inherit;color:inherit;}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{opacity:1;height:28px;}

/* layout */
.min-h-screen{min-height:100vh;}
.max-w-xl{max-width:36rem;}
.mx-auto{margin-left:auto;margin-right:auto;}
.flex{display:flex;}
.grid{display:grid;}
.grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr));}
.hidden{display:none;}
.flex-1{flex:1 1 0%;}
.flex-shrink-0{flex-shrink:0;}
.items-center{align-items:center;}
.items-start{align-items:flex-start;}
.justify-between{justify-content:space-between;}
.gap-2{gap:.5rem;}
.gap-3{gap:.75rem;}
.space-y-2 > * + *{margin-top:.5rem;}
.space-y-2\.5 > * + *{margin-top:.625rem;}
.text-center{text-align:center;}

/* sizing */
.w-full{width:100%;}
.w-8{width:2rem;}
.w-24{width:6rem;}
.w-4{width:1rem;}
.h-4{height:1rem;}

/* spacing */
.p-3{padding:.75rem;}.p-4{padding:1rem;}
.px-2{padding-left:.5rem;padding-right:.5rem;}
.px-3{padding-left:.75rem;padding-right:.75rem;}
.px-4{padding-left:1rem;padding-right:1rem;}
.py-0\.5{padding-top:.125rem;padding-bottom:.125rem;}
.py-1\.5{padding-top:.375rem;padding-bottom:.375rem;}
.py-2{padding-top:.5rem;padding-bottom:.5rem;}
.py-4{padding-top:1rem;padding-bottom:1rem;}
.py-6{padding-top:1.5rem;padding-bottom:1.5rem;}
.pt-3{padding-top:.75rem;}
.pb-20{padding-bottom:5rem;}
.mb-3{margin-bottom:.75rem;}.mb-4{margin-bottom:1rem;}.mb-5{margin-bottom:1.25rem;}
.mt-0\.5{margin-top:.125rem;}.mt-2{margin-top:.5rem;}.mt-4{margin-top:1rem;}

/* radius */
.rounded-lg{border-radius:.5rem;}
.rounded-xl{border-radius:.75rem;}
.rounded-2xl{border-radius:1rem;}
.rounded-full{border-radius:9999px;}

/* borders */
.border{border-width:1px;}
.border-2{border-width:2px;}
.border-t{border-top-width:1px;}
.border-slate-100{border-color:#f1f5f9;}
.border-slate-200{border-color:#e2e8f0;}
.border-slate-300{border-color:#cbd5e1;}
.border-blue-300{border-color:#93c5fd;}
.border-blue-500{border-color:#3b82f6;}
.border-yellow-300{border-color:#fde047;}
.border-orange-300{border-color:#fdba74;}
.border-green-300{border-color:#86efac;}

/* backgrounds */
.bg-white{background-color:#fff;}
.bg-slate-50{background-color:#f8fafc;}
.bg-slate-100{background-color:#f1f5f9;}
.bg-blue-50{background-color:#eff6ff;}
.bg-blue-500{background-color:#3b82f6;}
.bg-blue-600{background-color:#2563eb;}
.bg-yellow-50{background-color:#fefce8;}
.bg-orange-50{background-color:#fff7ed;}
.bg-green-50{background-color:#f0fdf4;}

/* text */
.font-sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;}
.text-xs{font-size:.75rem;line-height:1rem;}
.text-sm{font-size:.875rem;line-height:1.25rem;}
.text-lg{font-size:1.125rem;line-height:1.75rem;}
.text-xl{font-size:1.25rem;line-height:1.75rem;}
.text-2xl{font-size:1.5rem;line-height:2rem;}
.font-medium{font-weight:500;}
.font-semibold{font-weight:600;}
.font-bold{font-weight:700;}
.leading-relaxed{line-height:1.625;}
.tracking-wide{letter-spacing:.025em;}
.whitespace-pre-wrap{white-space:pre-wrap;}
.text-white{color:#fff;}
.text-slate-400{color:#94a3b8;}
.text-slate-500{color:#64748b;}
.text-slate-600{color:#475569;}
.text-slate-700{color:#334155;}
.text-slate-800{color:#1e293b;}
.text-blue-600{color:#2563eb;}
.text-blue-700{color:#1d4ed8;}
.text-yellow-700{color:#a16207;}
.text-orange-700{color:#c2410c;}
.text-green-600{color:#16a34a;}
.text-green-700{color:#15803d;}

/* effects */
.shadow-sm{box-shadow:0 1px 2px 0 rgba(0,0,0,.05);}
.shadow-md{box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);}
.transition-all{transition:all .15s ease;}
.transition-colors{transition:background-color .15s ease,color .15s ease,border-color .15s ease;}
.select-all{user-select:all;}

/* states */
.hover\:bg-blue-700:hover{background-color:#1d4ed8;}
.active\:bg-blue-100:active{background-color:#dbeafe;}
.active\:bg-blue-800:active{background-color:#1e40af;}
.active\:scale-95:active{transform:scale(.95);}
.focus\:outline-none:focus{outline:2px solid transparent;outline-offset:2px;}
.focus\:border-blue-400:focus{border-color:#60a5fa;}
.focus\:ring-1:focus{box-shadow:0 0 0 1px #93c5fd;}
.focus\:ring-blue-300:focus{box-shadow:0 0 0 1px #93c5fd;}

/* ── 品牌化视觉增强（仅外观，不改逻辑） ── */
body.app-bg{
  background:
    radial-gradient(1100px 520px at 12% -8%, #ffe3d3 0%, rgba(255,227,211,0) 55%),
    radial-gradient(900px 480px at 108% 4%, #ffd9cf 0%, rgba(255,217,207,0) 50%),
    linear-gradient(180deg, #fff6f1 0%, #fdeee7 100%);
  background-attachment:fixed;
}
/* hero 头部 */
.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#ff8a00 0%,#ff5a1f 55%,#f5331d 100%);
  border-radius:1.25rem;
  padding:1.5rem 1.4rem;
  color:#fff;
  box-shadow:0 18px 38px -16px rgba(245,51,29,.5);
}
.hero::after{
  content:"";position:absolute;right:-40px;top:-50px;
  width:190px;height:190px;border-radius:9999px;
  background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), rgba(255,255,255,0) 70%);
  pointer-events:none;
}
.hero h1{font-size:1.4rem;line-height:1.3;letter-spacing:.01em;}
.hero p{color:rgba(255,255,255,.82);}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.7rem;font-weight:700;letter-spacing:.08em;
  padding:4px 10px;border-radius:9999px;
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);
  margin-bottom:.6rem;
}
/* 卡片 */
.card{
  background:#fff;
  border:1px solid rgba(226,232,240,.9);
  border-radius:1rem;
  box-shadow:0 10px 26px -20px rgba(30,41,59,.45);
  transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 18px 36px -22px rgba(245,51,29,.5);
  border-color:#ffc7b0;
}
/* STEP 数字徽标 */
.step-head{display:flex;align-items:center;gap:.55rem;margin-bottom:.85rem;}
.step-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:1.5rem;height:1.5rem;border-radius:.55rem;flex-shrink:0;
  font-size:.8rem;font-weight:800;color:#fff;
  background:linear-gradient(135deg,#ff8a00,#f5331d);
  box-shadow:0 5px 12px -4px rgba(245,51,29,.6);
}
.step-label{font-size:.78rem;font-weight:700;color:#475569;letter-spacing:.02em;}
/* 考试类型按钮 */
.exam-btn{background:#fff;}
.exam-btn:hover{border-color:#ffc7b0;background:#fff8f4;}
.exam-on{
  border-color:#f5331d !important;
  background:linear-gradient(135deg,#fff1e8,#ffe9e2) !important;
  box-shadow:0 8px 20px -10px rgba(245,51,29,.55);
}
/* 输入框质感 */
.score-input{
  background:linear-gradient(180deg,#ffffff,#f7f9fd);
  border:1px solid #dbe2ec !important;
  box-shadow:inset 0 1px 2px rgba(15,23,42,.05);
}
.score-input:focus{
  background:#fff;
  border-color:#f5331d !important;
  box-shadow:0 0 0 3px rgba(245,51,29,.16),inset 0 1px 2px rgba(15,23,42,.04) !important;
}
/* 生成按钮：渐变发光 */
.gen-cta{
  background:linear-gradient(135deg,#ff8a00 0%,#ff5a1f 50%,#f5331d 100%) !important;
  box-shadow:0 14px 30px -10px rgba(245,51,29,.6),inset 0 1px 0 rgba(255,255,255,.25);
  letter-spacing:.02em;
}
.gen-cta:hover{
  filter:brightness(1.05);
  box-shadow:0 18px 38px -10px rgba(245,51,29,.75),inset 0 1px 0 rgba(255,255,255,.3);
}
.gen-cta:active{transform:scale(.97);}
/* 复制按钮 */
.copy-btn{color:#f5331d;background:#fff1ec;}
.copy-btn:active{background:#ffe0d6;}
/* ── 密码锁屏 ── */
#lock-screen{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#ff8a00 0%,#ff5a1f 55%,#f5331d 100%);
}
#lock-box{
  background:#fff;border-radius:1.25rem;padding:2rem 1.75rem;width:min(88vw,320px);
  box-shadow:0 24px 48px -12px rgba(245,51,29,.45);text-align:center;
}
#lock-box h2{font-size:1.1rem;font-weight:700;color:#1e293b;margin-bottom:.35rem;}
#lock-box p{font-size:.8rem;color:#94a3b8;margin-bottom:1.25rem;}
#pin-dots{display:flex;justify-content:center;gap:.75rem;margin-bottom:1.5rem;}
.pin-dot{
  width:14px;height:14px;border-radius:9999px;
  border:2px solid #dbe2ec;background:#fff;transition:all .15s ease;
}
.pin-dot.filled{background:#f5331d;border-color:#f5331d;}
#pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;}
.pin-key{
  padding:.85rem 0;border-radius:.75rem;font-size:1.25rem;font-weight:600;color:#1e293b;
  background:#f8fafc;border:1px solid #e2e8f0;
  transition:background .12s,transform .1s;cursor:pointer;
}
.pin-key:active{background:#ffe0d6;border-color:#ffc7b0;transform:scale(.94);}
.pin-key.del{font-size:1rem;color:#64748b;}
.pin-key.empty{visibility:hidden;}
#lock-error{
  font-size:.78rem;color:#ef4444;font-weight:600;
  margin-top:.9rem;min-height:1.1rem;
  animation:shake .3s ease;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body class="app-bg min-h-screen font-sans text-slate-800">

<!-- 密码锁屏 -->
<div id="lock-screen">
  <div id="lock-box">
    <h2>请输入访问密码</h2>
    <p>剑桥小班课推课话术</p>
    <div id="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
    <div id="pin-pad">
      <button class="pin-key" onclick="pinInput('1')">1</button>
      <button class="pin-key" onclick="pinInput('2')">2</button>
      <button class="pin-key" onclick="pinInput('3')">3</button>
      <button class="pin-key" onclick="pinInput('4')">4</button>
      <button class="pin-key" onclick="pinInput('5')">5</button>
      <button class="pin-key" onclick="pinInput('6')">6</button>
      <button class="pin-key" onclick="pinInput('7')">7</button>
      <button class="pin-key" onclick="pinInput('8')">8</button>
      <button class="pin-key" onclick="pinInput('9')">9</button>
      <button class="pin-key empty" disabled></button>
      <button class="pin-key" onclick="pinInput('0')">0</button>
      <button class="pin-key del" onclick="pinDelete()">⌫</button>
    </div>
    <div id="lock-error"></div>
  </div>
</div>
<button onclick="window.open('推课逻辑说明.html','_blank')"
  style="position:fixed;top:14px;right:14px;z-index:50;display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:999px;background:#fff;color:#f5331d;font-size:13px;font-weight:700;border:1px solid #ffc7b0;box-shadow:0 4px 14px rgba(15,23,42,.12);">
  概览
</button>
<div class="max-w-xl mx-auto px-4 py-6 pb-20">

  <!-- Header -->
  <div class="hero mb-5">
    <h1 class="font-bold">剑桥小班课推课话术</h1>
    <p class="text-sm mt-0.5">输入模考成绩，一键生成微信话术</p>
  </div>

  <!-- Step 1: Exam type -->
  <div class="card p-4 mb-3">
    <div class="step-head"><span class="step-num">1</span><span class="step-label">考试类型</span></div>
    <div class="grid grid-cols-2 gap-3">
      <button id="btn-KET" onclick="selectExam('KET')"
        class="exam-btn py-4 rounded-xl border-2 border-slate-200 transition-all active:scale-95">
        <div class="text-lg font-bold">KET</div>
        <div class="text-xs text-slate-400 mt-0.5">A2 Key</div>
      </button>
      <button id="btn-PET" onclick="selectExam('PET')"
        class="exam-btn py-4 rounded-xl border-2 border-slate-200 transition-all active:scale-95">
        <div class="text-lg font-bold">PET</div>
        <div class="text-xs text-slate-400 mt-0.5">B1 Preliminary</div>
      </button>
    </div>
  </div>

  <!-- Step 2: Scores -->
  <div class="card p-4 mb-3">
    <div class="step-head"><span class="step-num">2</span><span class="step-label">模考成绩</span></div>
    <div class="space-y-2.5" id="score-rows"></div>
    <div id="avg-row" class="hidden mt-4 pt-3 border-t border-slate-100 flex items-center justify-between">
      <span class="text-sm font-medium text-slate-600">四项均分</span>
      <div class="flex items-center gap-2">
        <span id="avg-val" class="text-2xl font-bold"></span>
        <span id="avg-badge" class="text-xs px-2 py-0.5 rounded-full font-semibold border"></span>
      </div>
    </div>
  </div>

  <!-- Generate button -->
  <button id="gen-btn" onclick="generate()"
    class="gen-cta hidden w-full text-white font-semibold py-4 rounded-2xl transition-all mb-4">
    生成推课话术 →
  </button>

  <!-- Output -->
  <div id="output-panel" class="hidden card p-4">
    <div class="flex items-center justify-between mb-3">
      <p class="text-xs font-semibold text-slate-400 tracking-wide">推课话术（可直接复制发送）</p>
      <button onclick="copyScript()"
        class="copy-btn text-xs font-medium px-3 py-1.5 rounded-lg transition-colors">
        📋 复制全文
      </button>
    </div>
    <div id="script-text"
      class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap bg-slate-50 rounded-xl p-3 select-all"></div>
    <div id="copy-msg" class="hidden text-center text-green-600 text-xs mt-2 font-medium">✓ 已复制到剪贴板</div>
  </div>

</div>

<script>
const SUBJECTS = ['听力', '口语', '阅读', '写作'];
let examType = null;
let scores = [null, null, null, null];

// ── Level helpers ──────────────────────────────────────────
function getLevel(score, exam) {
  if (score == null || isNaN(score)) return null;
  exam = exam || examType;
  if (exam === 'PET') {
    // B1 Preliminary 剑桥量表 120–170（官方）
    if (score < 102) return { label: 'Pre-A1',     result: '未通过', bg: 'bg-slate-100',  text: 'text-slate-500',  border: 'border-slate-300' };
    if (score < 140) return { label: 'A2',         result: '未通过', bg: 'bg-yellow-50', text: 'text-yellow-700', border: 'border-yellow-300' };
    if (score < 153) return { label: 'B1 Grade C', result: '通过',   bg: 'bg-orange-50', text: 'text-orange-700', border: 'border-orange-300' };
    if (score < 160) return { label: 'B1 Grade B', result: '优秀',   bg: 'bg-blue-50',   text: 'text-blue-700',   border: 'border-blue-300' };
    return               { label: 'B2 Grade A', result: '卓越',   bg: 'bg-green-50',  text: 'text-green-700',  border: 'border-green-300' };
  }
  // A2 Key 剑桥量表 100–150（官方）
  if (score < 82)  return { label: '未达 Pre-A1', result: '未通过', bg: 'bg-slate-100', text: 'text-slate-500', border: 'border-slate-300' };
  if (score < 100) return { label: 'Pre-A1',      result: '未通过', bg: 'bg-slate-100', text: 'text-slate-500', border: 'border-slate-300' };
  if (score < 120) return { label: 'A1',           result: '未通过', bg: 'bg-yellow-50', text: 'text-yellow-700', border: 'border-yellow-300' };
  if (score < 133) return { label: 'A2 Grade C',   result: '通过',   bg: 'bg-orange-50', text: 'text-orange-700', border: 'border-orange-300' };
  if (score < 140) return { label: 'A2 Grade B',   result: '优秀',   bg: 'bg-blue-50',   text: 'text-blue-700',   border: 'border-blue-300' };
  return               { label: 'B1 Grade A',   result: '卓越',   bg: 'bg-green-50',  text: 'text-green-700',  border: 'border-green-300' };
}

function getCurrentGrade(avg) {
  if (avg < 100) return '小学3–4年级';
  if (avg < 120) return '小学5–6年级';
  if (avg < 133) return '初中1年级';
  if (avg < 140) return '初中1–2年级';
  return '初中2–3年级';
}

// ── Score rows ─────────────────────────────────────────────
function initScoreRows() {
  document.getElementById('score-rows').innerHTML = SUBJECTS.map((s, i) => `
    <div class="flex items-center gap-3">
      <span class="text-sm font-medium text-slate-600 w-8 flex-shrink-0">${s}</span>
      <input type="number" min="60" max="170" placeholder="输入分数"
        id="score-${i}"
        oninput="onScoreChange(${i}, this.value)"
        class="score-input flex-1 rounded-lg px-3 py-2 text-sm text-center focus:outline-none transition-all"/>
      <span id="level-${i}" class="text-xs px-2 py-0.5 rounded-full font-semibold w-24 text-center border flex-shrink-0"></span>
    </div>
  `).join('');
}

function onScoreChange(idx, val) {
  scores[idx] = val === '' ? null : parseFloat(val);
  refreshUI();
}

function updateBadges() {
  scores.forEach((sc, idx) => {
    const lv = getLevel(sc);
    const el = document.getElementById(`level-${idx}`);
    if (!el) return;
    if (lv) {
      el.textContent = lv.label;
      el.className = `text-xs px-2 py-0.5 rounded-full font-semibold w-24 text-center border ${lv.bg} ${lv.text} ${lv.border}`;
    } else {
      el.textContent = '';
      el.className = 'text-xs px-2 py-0.5 rounded-full font-semibold w-24 text-center border';
    }
  });
}

// ── Avg ────────────────────────────────────────────────────
function getAvg() {
  const valid = scores.filter(s => s !== null && !isNaN(s));
  if (valid.length < 4) return null;
  return valid.reduce((a, b) => a + b, 0) / 4;
}

// ── Exam select ────────────────────────────────────────────
function selectExam(type) {
  examType = type;
  ['KET','PET'].forEach(t => {
    const btn = document.getElementById(`btn-${t}`);
    btn.className = `exam-btn py-4 rounded-xl border-2 transition-all active:scale-95 ${
      t === type ? 'exam-on' : 'border-slate-200'
    }`;
  });
  document.getElementById('output-panel').classList.add('hidden');
  refreshUI();
}

// ── Master refresh ─────────────────────────────────────────
function refreshUI() {
  const avg = getAvg();
  updateBadges();

  // Avg row
  const avgRow = document.getElementById('avg-row');
  if (avg !== null) {
    avgRow.classList.remove('hidden');
    document.getElementById('avg-val').textContent = Math.round(avg);
    const lv = getLevel(avg);
    const badge = document.getElementById('avg-badge');
    badge.textContent = `${lv.label} · ${lv.result}`;
    badge.className = `text-xs px-2 py-0.5 rounded-full font-semibold border ${lv.bg} ${lv.text} ${lv.border}`;
  } else {
    avgRow.classList.add('hidden');
  }

  // Generate button
  const genBtn = document.getElementById('gen-btn');
  const ready = examType && avg !== null;
  ready ? genBtn.classList.remove('hidden') : genBtn.classList.add('hidden');
}

// ── Weakness text ──────────────────────────────────────────
// level: 'ket'（Power Up 3 / Think 1）| 'pet'（Think 2）| 'fce'（Think 3+4）
function getWeaknessText(subjectIdx, level, isPU3) {
  const name = SUBJECTS[subjectIdx];
  const examWord = level === 'fce' ? 'FCE' : level === 'pet' ? 'PET' : 'KET';

  const listening = `听力这块，课程的核心抓手是培养"记笔记"的习惯——训练孩子边听边记关键信息，再用笔记复述文本主要内容，逐步提升答题正确率。同时会专项训练"听前审题+预判内容"的应试技巧，帮孩子减少因为信息量大跟不上节奏而失分的情况。`;

  const speaking = {

  };
  return map[name] || '';
}

function generate() {
  const avg = getAvg();
  if (!examType || avg === null) return;

  // Find weakest subject(s)
  const order = [0, 1, 2, 3].sort((a, b) => scores[a] - scores[b]);
  const maxScore = scores[order[3]];
  const minScore = scores[order[0]];

  // If scores are very balanced (max - min ≤ 3), default to listening & reading
  let weakIdxs;
  if (maxScore - minScore <= 3) {
    weakIdxs = [0, 2]; // 听力(0) & 阅读(2)
  } else {
    // Otherwise, find weakest subject(s) — include the second-lowest too if it's close (≤5 分)
    weakIdxs = [order[0]];
    if (scores[order[1]] - scores[order[0]] <= 5) weakIdxs.push(order[1]);
  }

  // 推 Power Up 的情况：KET 单项/均分 < 82（PU2）或均分 < 110（PU3）；PET 均分 < 102（PU3）
  const isPU3 = (examType === 'KET' && (avg < 110 || minScore < 82)) || (examType === 'PET' && avg < 102);

  // 推荐课程对应的级别，单项提升话术按级别给（而非考试类型）
  // KET: <120 → Think 1 / PU3（ket）; >=120 → Think 2（pet）
  // PET: <120 → Think 1（ket）; 120–140 → Think 2（pet）; >=140 → Think 3+4（fce）
  let level;
  if (examType === 'KET') {
    level = avg < 120 ? 'ket' : 'pet';
  } else {
    level = avg < 120 ? 'ket' : avg < 140 ? 'pet' : 'fce';
  }
  if (isPU3) level = 'ket'; // Power Up 路线统一用 KET 阶段的单项提升话术

  let weakBlock;
  if (weakIdxs.length === 1) {
    const i = weakIdxs[0];
    weakBlock = `四项里，${SUBJECTS[i]}是孩子目前相对薄弱的地方（${Math.round(scores[i])}分）。${getWeaknessText(i, level, isPU3)}`;
  } else {
    const [a, b] = weakIdxs;
    weakBlock = `四项里，${SUBJECTS[a]}（${Math.round(scores[a])}分）和${SUBJECTS[b]}（${Math.round(scores[b])}分）是孩子目前相对薄弱的两项。

${getWeaknessText(a, level, isPU3)}

${getWeaknessText(b, level, isPU3)}`;
  }

  const currentGrade = getCurrentGrade(avg);
  const avgLevel = getLevel(avg);
  const levelStr = avgLevel.label;
  const resultStr = avgLevel.result;
  const { course, goal } = getCourseAndGoal(avg, minScore);

  const script =
`【成绩分析】
孩子这次 ${examType} 模考四项均分是 ${Math.round(avg)} 分，对应剑桥 ${levelStr} 的水平（${examType} ${resultStr}）。用公立校来类比，大概相当于${currentGrade}的英语词汇量和阅读水平。

【推荐课程】
${course}

${weakBlock}

【学习目标】
${goal}`;

  document.getElementById('script-text').textContent = script;
  document.getElementById('output-panel').classList.remove('hidden');
  setTimeout(() => {
    document.getElementById('output-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

// ── Copy ───────────────────────────────────────────────────
function copyScript() {
  const text = document.getElementById('script-text').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(showCopyMsg);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopyMsg();
  }
}

function showCopyMsg() {
  const msg = document.getElementById('copy-msg');
  msg.classList.remove('hidden');
  setTimeout(() => msg.classList.add('hidden'), 2000);
}

// ── 密码锁 ────────────────────────────────────────────────
const CORRECT_PIN = '0772';
let pinBuffer = '';

function pinInput(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updateDots();
  if (pinBuffer.length === 4) checkPin();
}

function pinDelete() {
  pinBuffer = pinBuffer.slice(0, -1);
  document.getElementById('lock-error').textContent = '';
  updateDots();
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById(`dot-${i}`).classList.toggle('filled', i < pinBuffer.length);
  }
}

function checkPin() {
  if (pinBuffer === CORRECT_PIN) {
    document.getElementById('lock-screen').style.display = 'none';
  } else {
    const err = document.getElementById('lock-error');
    err.textContent = '密码错误，请重试';
    err.style.animation = 'none';
    void err.offsetWidth;
    err.style.animation = 'shake .3s ease';
    pinBuffer = '';
    updateDots();
  }
}
